<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My First Blog Post - Adnan Harun Dogan</title>
        <link rel="stylesheet" href="../../style.css" />
        <link rel="icon" type="image/jpeg" href="../../profile-sm.jpeg" />
        <style>
            .blog-page {
                max-width: 750px;
                margin: 0 auto;
                padding: 40px 20px;
                background-color: var(--bg-primary);
                min-height: 100vh;
            }
            .blog-page h1 {
                font-size: 1.8em;
                margin-bottom: 8px;
                color: var(--text-primary);
            }
            .blog-meta {
                color: var(--text-muted);
                font-size: 0.9em;
                margin-bottom: 30px;
            }
            .blog-body {
                color: var(--text-secondary);
                line-height: 1.8;
            }
            .blog-back {
                display: inline-block;
                margin-bottom: 30px;
                color: var(--link-color);
                text-decoration: none;
                font-size: 0.9em;
            }
            .blog-back:hover {
                color: var(--accent-color);
            }
        </style>
    </head>
    <body>
        <div class="blog-page">
            <a href="../../index.html" class="blog-back">&larr; Back to home</a>
            <h1>My First Blog Post</h1>
            <div class="blog-meta">Jan 2026</div>
            <div class="blog-body">
                <p>A brief description of the blog post</p>
            </div>
        </div>
        <script>
            // Inherit theme from main site
            const saved = localStorage.getItem("theme");
            if (saved) {
                document.documentElement.setAttribute("data-theme", saved);
            } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        </script>
    </body>
</html>
